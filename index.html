<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muneeba Jamil — Full Stack Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #c9a84c;
      --accent2: #7c6fcd;
      --accent3: #4fc8a0;
      --text: #e8e8f0;
      --muted: #7a7a96;
      --white: #ffffff;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom Cursor */
    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.3s, height 0.3s, opacity 0.3s;
      opacity: 0.6;
    }
    .cursor.hovered { width: 20px; height: 20px; }
    .cursor-ring.hovered { width: 56px; height: 56px; opacity: 0.3; }

    /* Noise Overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9997;
      opacity: 0.3;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.85);
      border-bottom: 1px solid rgba(201,168,76,0.12);
      transition: all 0.3s;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { width: 100%; }

    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 3rem;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 60% 50% at 80% 30%, rgba(124,111,205,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 70%, rgba(201,168,76,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(79,200,160,0.05) 0%, transparent 50%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 900px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeInDown 0.8s ease both;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--accent);
    }

    h1.hero-name {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 1.0;
      color: var(--white);
      letter-spacing: -0.02em;
      animation: fadeInUp 0.8s ease 0.2s both;
    }
    h1.hero-name .accent { color: var(--accent); }
    h1.hero-name .line2 {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.25);
    }

    .hero-tagline {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.8;
      animation: fadeInUp 0.8s ease 0.4s both;
    }
    .hero-tagline strong { color: var(--accent3); font-weight: 500; }

    .hero-stats {
      display: flex;
      gap: 3rem;
      margin-top: 3rem;
      animation: fadeInUp 0.8s ease 0.5s both;
    }
    .stat-item { display: flex; flex-direction: column; }
    .stat-num {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--white);
    }
    .stat-num .unit { color: var(--accent); font-size: 1.2rem; }
    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    .hero-cta {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
      animation: fadeInUp 0.8s ease 0.6s both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: var(--accent);
      color: #0a0a0f;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      cursor: none;
      text-decoration: none;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .btn-primary:hover::before { transform: translateX(0); }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: transparent;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      cursor: none;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    .scroll-indicator {
      position: absolute;
      bottom: 2.5rem;
      left: 3rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      animation: fadeIn 1s ease 1s both;
    }
    .scroll-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent));
      animation: scrollPulse 2s infinite;
    }
    .scroll-text {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }

    /* Sections */
    section { padding: 7rem 3rem; max-width: 1200px; margin: 0 auto; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 4rem;
    }
    .section-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--white);
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }
    .about-text p {
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 1.2rem;
      font-size: 1.0rem;
    }
    .about-text p strong { color: var(--text); }
    .about-text p .highlight { color: var(--accent); }

    .about-visual {
      position: relative;
    }
    .about-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .about-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    }
    .about-card-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(42,42,58,0.5);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 0.78rem; color: var(--muted); }
    .info-value { font-size: 0.85rem; color: var(--text); font-weight: 500; }
    .info-value .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--accent);
      font-size: 0.72rem;
      font-family: var(--font-mono);
    }

    /* Skills */
    .skills-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .skill-category {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2rem;
      transition: border-color 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }
    .skill-category::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s;
    }
    .skill-category:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-4px); }
    .skill-category:hover::after { transform: scaleX(1); }

    .skill-cat-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .skill-cat-title::before {
      content: '';
      display: block;
      width: 16px; height: 1px;
      background: var(--accent);
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .skill-tag {
      padding: 0.3rem 0.8rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text);
      transition: all 0.2s;
      font-family: var(--font-mono);
    }
    .skill-tag:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Experience */
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent), transparent);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 3.5rem;
      padding-left: 2.5rem;
      opacity: 0;
      transform: translateX(-20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .timeline-item.visible { opacity: 1; transform: translateX(0); }

    .timeline-dot {
      position: absolute;
      left: -2.05rem;
      top: 0.3rem;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(201,168,76,0.15);
    }

    .timeline-period {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .timeline-role {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.25rem;
    }
    .timeline-org {
      font-size: 0.85rem;
      color: var(--accent2);
      margin-bottom: 1rem;
    }
    .timeline-desc {
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.9rem;
    }
    .timeline-desc li {
      margin-bottom: 0.4rem;
      padding-left: 1rem;
      position: relative;
      list-style: none;
    }
    .timeline-desc li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--accent3);
      font-size: 0.7rem;
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2.2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
      transform: translateY(30px);
    }
    .project-card.visible { opacity: 1; transform: translateY(0); }
    .project-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(201,168,76,0.08);
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s;
    }
    .project-card:hover::before { transform: scaleX(1); }

    .project-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: rgba(201,168,76,0.4);
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .project-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.8rem;
    }
    .project-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .project-year {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: rgba(124,111,205,0.1);
      border: 1px solid rgba(124,111,205,0.3);
      color: var(--accent2);
      font-size: 0.68rem;
      font-family: var(--font-mono);
      margin-bottom: 1rem;
    }
    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tech-tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(42,42,58,0.8);
    }

    /* Education */
    .edu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .edu-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2.2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .edu-card:hover { border-color: rgba(201,168,76,0.3); }
    .edu-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(to bottom, var(--accent), transparent);
    }
    .edu-degree {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.4rem;
    }
    .edu-school {
      font-size: 0.88rem;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .edu-period {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .edu-detail {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .cgpa-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.8rem;
      padding: 0.3rem 0.8rem;
      background: rgba(79,200,160,0.08);
      border: 1px solid rgba(79,200,160,0.25);
      color: var(--accent3);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    /* Certifications */
    .cert-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }
    .cert-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .cert-item:hover {
      border-color: rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.03);
    }
    .cert-icon {
      width: 36px; height: 36px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1rem;
      flex-shrink: 0;
    }
    .cert-name {
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 500;
      line-height: 1.4;
    }
    .cert-issuer {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.25rem;
      font-family: var(--font-mono);
    }

    /* Contact */
    #contact {
      text-align: center;
    }
    .contact-inner {
      max-width: 600px;
      margin: 0 auto;
    }
    .contact-intro {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 3rem;
    }
    .contact-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 3rem;
    }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 1.6rem;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .contact-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .contact-link svg { width: 16px; height: 16px; }

    /* Footer */
    footer {
      text-align: center;
      padding: 2.5rem 3rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }
    footer span { color: var(--accent); }

    /* Floating particles */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0.15;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }

    // Cursor Component
    function Cursor() {
      const cursorRef = useRef(null);
      const ringRef = useRef(null);
      const pos = useRef({ x: 0, y: 0 });
      const ringPos = useRef({ x: 0, y: 0 });
      const raf = useRef(null);

      useEffect(() => {
        const move = (e) => {
          pos.current = { x: e.clientX, y: e.clientY };
          if (cursorRef.current) {
            cursorRef.current.style.left = e.clientX + 'px';
            cursorRef.current.style.top = e.clientY + 'px';
          }
        };

        const animateRing = () => {
          ringPos.current.x += (pos.current.x - ringPos.current.x) * 0.12;
          ringPos.current.y += (pos.current.y - ringPos.current.y) * 0.12;
          if (ringRef.current) {
            ringRef.current.style.left = ringPos.current.x + 'px';
            ringRef.current.style.top = ringPos.current.y + 'px';
          }
          raf.current = requestAnimationFrame(animateRing);
        };

        const hover = () => {
          cursorRef.current?.classList.add('hovered');
          ringRef.current?.classList.add('hovered');
        };
        const unhover = () => {
          cursorRef.current?.classList.remove('hovered');
          ringRef.current?.classList.remove('hovered');
        };

        document.addEventListener('mousemove', move);
        document.querySelectorAll('a, button, .skill-tag, .project-card, .cert-item, .btn-primary, .btn-outline').forEach(el => {
          el.addEventListener('mouseenter', hover);
          el.addEventListener('mouseleave', unhover);
        });

        raf.current = requestAnimationFrame(animateRing);
        return () => {
          document.removeEventListener('mousemove', move);
          cancelAnimationFrame(raf.current);
        };
      }, []);

      return (
        <>
          <div className="cursor" ref={cursorRef}></div>
          <div className="cursor-ring" ref={ringRef}></div>
        </>
      );
    }

    // Typewriter hook
    function useTypewriter(words, speed = 80, pause = 2000) {
      const [display, setDisplay] = useState('');
      const [wordIdx, setWordIdx] = useState(0);
      const [charIdx, setCharIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const word = words[wordIdx];
        const timeout = setTimeout(() => {
          if (!deleting) {
            setDisplay(word.substring(0, charIdx + 1));
            if (charIdx + 1 === word.length) {
              setTimeout(() => setDeleting(true), pause);
            } else {
              setCharIdx(c => c + 1);
            }
          } else {
            setDisplay(word.substring(0, charIdx - 1));
            if (charIdx === 0) {
              setDeleting(false);
              setWordIdx(i => (i + 1) % words.length);
            } else {
              setCharIdx(c => c - 1);
            }
          }
        }, deleting ? speed / 2 : speed);
        return () => clearTimeout(timeout);
      }, [charIdx, deleting, wordIdx, words, speed, pause]);

      return display;
    }

    // Intersection Observer hook
    function useReveal(threshold = 0.1) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { setVisible(true); observer.disconnect(); }
        }, { threshold });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [threshold]);

      return [ref, visible];
    }
